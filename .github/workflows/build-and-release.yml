name: Build and Release Next.js App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js project
        run: npm run build

      # 【关键修改】：打包 standalone 目录，而不是 out 目录
      - name: Zip build output
        run: |
          # 按照 Next.js 官方文档要求，手动把公共静态文件和构建好的 JS/CSS 复制进 standalone 里面
          cp -r public .next/standalone/ || true
          cp -r .next/static .next/standalone/.next/
          
          # 进入 standalone 目录进行 zip 打包
          cd .next/standalone
          zip -r ../../nextjs-release.zip .
          cd ../../

      - name: Generate Release Tag
        id: generate_tag
        run: |
          echo "tag=build-$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag }}
          name: Release ${{ steps.generate_tag.outputs.tag }}
          files: nextjs-release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
